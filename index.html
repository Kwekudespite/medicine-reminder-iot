<!DOCTYPE html>
<html>
<head>
<title>Smart Medicine Reminder</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin-top:100px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
width:400px;
margin:auto;
}

.status{
font-size:24px;
color:#2c3e50;
margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h1>💊 Smart Medicine Reminder</h1>

<p>IoT Monitoring Dashboard</p>

<div class="status" id="status">
Waiting for update...
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const status = params.get("status");

if(status){
document.getElementById("status").innerHTML = status;
}

</script>

</body>
</html>
